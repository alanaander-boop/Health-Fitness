<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DESIGN ──────────────────────────────────────────────────────────────────
const CAMEL="#c9956a", WARM="#5a3a2a", MUTED="#b89880", ROSE="#f5d0d0", GREEN="#7a9a50", BLUE="#6a9fc0";

const LEO_SVG = `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='120' height='120' fill='#fdf6f1'/><ellipse cx='18' cy='16' rx='6' ry='4' fill='none' stroke='#d4a96a' stroke-width='2.2' opacity='0.45'/><ellipse cx='12' cy='20' rx='3' ry='2' fill='#d4a96a' opacity='0.18'/><ellipse cx='25' cy='20' rx='2.5' ry='1.8' fill='#d4a96a' opacity='0.18'/><ellipse cx='72' cy='8' rx='5' ry='3.5' fill='none' stroke='#c9956a' stroke-width='2' opacity='0.4'/><ellipse cx='100' cy='30' rx='6.5' ry='4.5' fill='none' stroke='#d4a96a' stroke-width='2.2' opacity='0.42'/><ellipse cx='93' cy='34' rx='3' ry='2' fill='#d4a96a' opacity='0.17'/><ellipse cx='40' cy='48' rx='7' ry='5' fill='none' stroke='#bf9060' stroke-width='2.3' opacity='0.38'/><ellipse cx='32' cy='53' rx='3.5' ry='2.2' fill='#bf9060' opacity='0.15'/><ellipse cx='90' cy='62' rx='6' ry='4' fill='none' stroke='#d4a96a' stroke-width='2' opacity='0.4'/><ellipse cx='15' cy='75' rx='5.5' ry='3.8' fill='none' stroke='#c9956a' stroke-width='2' opacity='0.38'/><ellipse cx='60' cy='88' rx='7' ry='4.8' fill='none' stroke='#d4a96a' stroke-width='2.3' opacity='0.42'/><ellipse cx='52' cy='93' rx='3.5' ry='2.2' fill='#d4a96a' opacity='0.17'/><ellipse cx='30' cy='112' rx='6' ry='4' fill='none' stroke='#d4a96a' stroke-width='2' opacity='0.38'/></svg>`;
const LEO_URI = `url("data:image/svg+xml,${encodeURIComponent(LEO_SVG)}")`;

const card = { background:"rgba(255,252,249,0.88)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)", borderRadius:22, padding:"16px 18px", marginBottom:12, boxShadow:"0 2px 20px rgba(180,120,80,0.10)", border:"1px solid rgba(210,175,150,0.25)" };
const sec  = { fontSize:11, fontWeight:700, color:MUTED, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:12 };
const inp  = { background:"rgba(255,248,244,0.9)", border:"1.5px solid rgba(210,175,150,0.35)", borderRadius:12, padding:"11px 14px", color:WARM, fontSize:14, outline:"none", width:"100%", boxSizing:"border-box", fontWeight:500 };
const btn  = { background:`linear-gradient(135deg,${CAMEL},#a0714a)`, border:"none", borderRadius:12, padding:"11px 20px", color:"#fff8f2", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", boxShadow:"0 4px 14px rgba(180,110,60,0.32)" };
const btnG = { background:"rgba(255,248,244,0.8)", border:"1.5px solid rgba(210,175,150,0.35)", borderRadius:10, padding:"8px 14px", color:MUTED, fontSize:12, fontWeight:600, cursor:"pointer" };
const btnS = { background:"rgba(255,248,244,0.8)", border:"1.5px solid rgba(210,175,150,0.3)", borderRadius:8, padding:"6px 12px", color:MUTED, fontSize:11, fontWeight:700, cursor:"pointer" };

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getTodayKey() { return new Date().toISOString().split("T")[0]; }
function getDOW() { return ["SU","MO","TU","WE","TH","FR","SA"][new Date().getDay()]; }
function load(key, fb) { try { const r=localStorage.getItem(key); return r?JSON.parse(r):fb; } catch { return fb; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function calcStreak(days, goals) {
  const keys = Object.keys(days).sort();
  let streak = 0;
  for (let i=keys.length-1; i>=0; i--) {
    const d = days[keys[i]];
    const p = (d.entries||[]).reduce((s,e)=>s+(e.protein||0),0);
    if (p >= goals.protein*0.8) streak++; else break;
  }
  return streak;
}
function getApiKey() { return localStorage.getItem("alana_apikey")||""; }
async function askClaude(messages) {
  const key = getApiKey();
  if (!key) throw new Error("Kein API Key");
  const res = await fetch("/.netlify/functions/claude-proxy", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      apiKey: key,
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:`Du bist ein Ernährungsassistent für Alana, eine Frau mit Magenverkleinerung (Sleeve). Analysiere Lebensmittel und gib NUR JSON zurück (kein Text, keine Backticks): {"name":"...", "kcal":123, "protein":12, "note":"optionaler Hinweis"} Portionen unter 300 kcal sind ideal. Protein ist besonders wichtig.`,
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

function ApiKeySetup({ onDone }) {
  const [keyInput, setKeyInput] = useState("");
  const [error, setError]       = useState("");
  function save() {
    if (!keyInput.startsWith("sk-ant-")) { setError("Key muss mit sk-ant- beginnen"); return; }
    localStorage.setItem("alana_apikey", keyInput.trim());
    onDone();
  }
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#fde8e8,#fdf0e8)`,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"rgba(255,252,249,0.95)",borderRadius:24,padding:32,maxWidth:380,width:"100%",boxShadow:"0 8px 40px rgba(180,110,60,0.15)",border:"1px solid rgba(210,175,150,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:12}}>🔑</div>
          <div style={{fontSize:22,fontWeight:700,color:WARM,marginBottom:8}}>API Key eingeben</div>
          <div style={{fontSize:13,color:MUTED,lineHeight:1.6}}>
            Geh auf <strong>console.anthropic.com</strong> → API Keys → neuen Key erstellen und hier einfügen. Er wird nur auf deinem Gerät gespeichert.
          </div>
        </div>
        <input
          style={{...inp,marginBottom:12,fontSize:12}}
          placeholder="sk-ant-api03-..."
          value={keyInput}
          onChange={e=>setKeyInput(e.target.value)}
          type="password"
        />
        {error && <div style={{color:"#c06060",fontSize:12,marginBottom:10,fontWeight:600}}>{error}</div>}
        <button style={{...btn,width:"100%",padding:"14px",fontSize:15,borderRadius:14}} onClick={save}>
          ✓ Speichern & starten
        </button>
        <div style={{fontSize:11,color:MUTED,marginTop:12,textAlign:"center",lineHeight:1.5}}>
          Der Key wird nur lokal auf deinem Gerät gespeichert — niemand sonst kann ihn sehen.
        </div>
      </div>
    </div>
  );
}
function fileToBase64(file) {
  return new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
}

// ─── COMPONENTS ──────────────────────────────────────────────────────────────
function Ring({ value, max, size=84, stroke=7, color, bgColor, label, unit="", emoji }) {
  const pct=Math.min(value/max,1), r=(size-stroke)/2, circ=2*Math.PI*r;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bgColor} strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"
            style={{transition:"stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1)",filter:`drop-shadow(0 0 5px ${color}70)`}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
          {emoji && <div style={{fontSize:13,lineHeight:1}}>{emoji}</div>}
          <div style={{fontSize:value>999?9:11,fontWeight:800,color:WARM,lineHeight:1}}>{value}{unit}</div>
        </div>
      </div>
      <span style={{fontSize:10,color:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</span>
    </div>
  );
}

function DrinkTimer({ lastMealTime }) {
  const [now,setNow] = useState(Date.now());
  useEffect(() => { const t=setInterval(()=>setNow(Date.now()),30000); return ()=>clearInterval(t); },[]);
  if (!lastMealTime) return null;
  const elapsed=(now-lastMealTime)/60000;
  const drinkOk=elapsed>=30, mealOk=elapsed>=180;
  const minsD=Math.max(0,Math.ceil(30-elapsed)), minsM=Math.max(0,Math.ceil(180-elapsed));
  return (
    <div style={{marginTop:10,display:"flex",gap:8}}>
      {[
        {ok:drinkOk, icon:"💧", yes:"Trinken OK ✓", no:`Trinken in ${minsD} Min`, okC:"#5a8fb0"},
        {ok:mealOk,  icon:"🍽️", yes:"Mahlzeit OK ✓", no:`Nächste in ${minsM} Min`, okC:"#5a9040"},
      ].map((x,i) => (
        <div key={i} style={{flex:1,padding:"8px 10px",borderRadius:12,textAlign:"center",background:x.ok?"linear-gradient(135deg,#e8f4fd,#d0e8f8)":"rgba(240,230,220,0.5)",border:`1px solid ${x.ok?"rgba(100,160,200,0.3)":"rgba(210,175,150,0.2)"}`}}>
          <div style={{fontSize:14}}>{x.icon}</div>
          <div style={{fontSize:10,fontWeight:700,color:x.ok?x.okC:MUTED,marginTop:2}}>{x.ok?x.yes:x.no}</div>
        </div>
      ))}
    </div>
  );
}

// ─── TODAY VIEW ──────────────────────────────────────────────────────────────
function TodayView({ today, saveDay, settings, todayDow }) {
  const [weightInput,setWeightInput] = useState("");
  const [stepsInput,setStepsInput]   = useState("");
  const [flexEdit,setFlexEdit]       = useState([false,false]);
  const [flexIn,setFlexIn]           = useState(today.flexWorkouts||["",""]);

  const lastEntry = today.entries?.[today.entries.length-1];
  const todayW    = settings.workoutPlan[todayDow]||[];

  function toggleSuppl(id) { const s=today.supplements||{}; saveDay({...today,supplements:{...s,[id]:!s[id]}}); }
  function toggleW(id)     { const w=today.workouts||{};    saveDay({...today,workouts:{...w,[id]:!w[id]}}); }
  function toggleFlex(idx) { const id=`flex_${idx}`, w=today.workouts||{}; saveDay({...today,workouts:{...w,[id]:!w[id]}}); }
  function saveFlex(idx,val) { const fw=[...(today.flexWorkouts||["",""])]; fw[idx]=val; saveDay({...today,flexWorkouts:fw}); const ne=[...flexEdit]; ne[idx]=false; setFlexEdit(ne); }

  return (
    <>
      {/* Supplements */}
      <div style={card}>
        <div style={sec}>Supplements heute</div>
        <div style={{display:"flex",gap:10}}>
          {settings.supplements.map(s => {
            const done=today.supplements?.[s.id];
            return (
              <div key={s.id} onClick={()=>toggleSuppl(s.id)} style={{flex:1,padding:"12px 8px",borderRadius:16,cursor:"pointer",textAlign:"center",transition:"all 0.2s",background:done?"linear-gradient(135deg,#f7e8d8,#fdeee6)":"rgba(255,250,246,0.7)",border:`1.5px solid ${done?"rgba(200,150,100,0.5)":"rgba(210,175,150,0.25)"}`,boxShadow:done?"0 4px 12px rgba(180,110,60,0.15)":"none"}}>
                <div style={{fontSize:22,marginBottom:4}}>{s.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color:done?CAMEL:MUTED}}>{s.label}</div>
                <div style={{fontSize:9,color:MUTED,marginTop:2}}>{s.time}</div>
                {done && <div style={{fontSize:10,marginTop:3,color:CAMEL,fontWeight:800}}>✓</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Weight */}
      <div style={card}>
        <div style={sec}>Gewicht heute</div>
        {today.weight ? (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:5}}>
              <span style={{fontSize:36,fontWeight:700,color:WARM,letterSpacing:"-0.03em"}}>{today.weight}</span>
              <span style={{fontSize:14,color:MUTED,fontWeight:600}}>kg</span>
            </div>
            <button style={btnG} onClick={()=>saveDay({...today,weight:null})}>Ändern</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:8}}>
            <input style={{...inp,flex:1}} placeholder="z.B. 81.4" value={weightInput} onChange={e=>setWeightInput(e.target.value)} type="number" step="0.1"/>
            <button style={btn} onClick={()=>{ const w=parseFloat(weightInput); if(w){saveDay({...today,weight:w});setWeightInput("");} }}>OK</button>
          </div>
        )}
      </div>

      {/* Steps */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={sec}>Schritte heute</div>
          {today.steps && <span style={{fontSize:13,fontWeight:700,color:today.steps>=settings.goals.steps?GREEN:MUTED}}>{today.steps.toLocaleString("de-DE")} / {settings.goals.steps.toLocaleString("de-DE")}</span>}
        </div>
        {today.steps ? (
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1,height:7,background:"rgba(210,175,150,0.2)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(today.steps/settings.goals.steps*100,100)}%`,background:"linear-gradient(90deg,#b8cc8a,#7a9a50)",borderRadius:4,transition:"width 0.5s ease"}}/>
            </div>
            <button style={btnG} onClick={()=>saveDay({...today,steps:null})}>Ändern</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:8}}>
            <input style={{...inp,flex:1}} placeholder="z.B. 10500" value={stepsInput} onChange={e=>setStepsInput(e.target.value)} type="number"/>
            <button style={btn} onClick={()=>{ const s=parseInt(stepsInput); if(s){saveDay({...today,steps:s});setStepsInput("");} }}>OK</button>
          </div>
        )}
      </div>

      {/* Meal slots */}
      <div style={card}>
        <div style={sec}>Mahlzeiten-Slots</div>
        {settings.mealSlots.map(slot => {
          const entries=(today.entries||[]).filter(e=>e.slotId===slot.id);
          const kcal=entries.reduce((s,e)=>s+(e.kcal||0),0);
          const filled=entries.length>0;
          return (
            <div key={slot.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(210,175,150,0.15)"}}>
              <div style={{fontSize:11,fontWeight:700,color:MUTED,width:38,flexShrink:0}}>{slot.time}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:filled?WARM:MUTED}}>{slot.label}</div>
                {filled && <div style={{fontSize:10,color:CAMEL,marginTop:1}}>{kcal} kcal · {entries.map(e=>e.name).join(", ")}</div>}
              </div>
              <div style={{width:10,height:10,borderRadius:"50%",background:filled?"#7a9a50":"rgba(210,175,150,0.3)",flexShrink:0}}/>
            </div>
          );
        })}
        <DrinkTimer lastMealTime={lastEntry?.timestamp||null}/>
      </div>

      {/* Food entries */}
      <div style={card}>
        <div style={sec}>Heute gegessen</div>
        {(today.entries||[]).length===0 ? (
          <div style={{textAlign:"center",padding:"16px 0",color:MUTED,fontSize:13,fontWeight:600}}>
            <div style={{fontSize:28,marginBottom:6}}>🍽️</div>Noch nichts – geh zu Eintragen
          </div>
        ) : today.entries.map(e => (
          <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(210,175,150,0.18)"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:WARM}}>{e.name}</div>
              <div style={{fontSize:11,color:MUTED,marginTop:2}}>
                {e.time} · <span style={{color:CAMEL}}>{e.kcal} kcal</span> · <span style={{color:"#c17a6b"}}>{e.protein}g P</span>
                {e.kcal>300 && <span style={{color:"#c07060",marginLeft:6,fontWeight:700}}>⚠️ groß</span>}
              </div>
            </div>
            <button onClick={()=>saveDay({...today,entries:today.entries.filter(x=>x.id!==e.id)})} style={{background:"rgba(245,220,210,0.5)",border:"none",color:"#c0907a",cursor:"pointer",fontSize:16,width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
          </div>
        ))}
      </div>

      {/* Water */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={sec}>Wasser 💧</div>
          <span style={{fontSize:13,fontWeight:700,color:"#8aabcc"}}>{today.water||0}ml / {settings.goals.water}ml</span>
        </div>
        <div style={{height:6,background:"rgba(138,171,204,0.18)",borderRadius:3,marginBottom:12,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min((today.water||0)/settings.goals.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3,transition:"width 0.4s"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[200,300,500].map(ml => (
            <button key={ml} style={{...btnG,flex:1,color:"#7a9fc0",borderColor:"rgba(138,171,204,0.35)",background:"rgba(225,240,252,0.5)",fontWeight:700}} onClick={()=>saveDay({...today,water:(today.water||0)+ml})}>+{ml}ml</button>
          ))}
        </div>
      </div>

      {/* Workouts */}
      <div style={card}>
        <div style={sec}>Sport heute</div>
        {todayW.length===0 && <div style={{textAlign:"center",padding:"8px 0",color:"#9aaa7a",fontSize:13,fontWeight:700}}>Ruhetag – gut erholen! 🛋️</div>}
        {todayW.map(w => {
          const done=today.workouts?.[w.id];
          return (
            <div key={w.id} onClick={()=>toggleW(w.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",cursor:"pointer",borderBottom:"1px solid rgba(210,175,150,0.15)"}}>
              <div style={{width:24,height:24,borderRadius:8,flexShrink:0,transition:"all 0.2s",background:done?TYPE_COLORS[w.type]||CAMEL:TYPE_BG[w.type]||"#fdf6f0",border:`2px solid ${done?TYPE_COLORS[w.type]||CAMEL:"rgba(210,175,150,0.3)"}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:done?`0 3px 10px ${TYPE_COLORS[w.type]||CAMEL}50`:"none"}}>
                {done && <span style={{fontSize:12,fontWeight:900,color:"white"}}>✓</span>}
              </div>
              <span style={{fontSize:13,fontWeight:600,color:done?WARM:MUTED}}>{w.label}</span>
            </div>
          );
        })}
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(210,175,150,0.18)"}}>
          <div style={{fontSize:10,color:"rgba(180,150,130,0.7)",fontWeight:700,marginBottom:8,letterSpacing:"0.1em"}}>FLEX-SLOTS DIESE WOCHE</div>
          {[0,1].map(idx => {
            const fw=today.flexWorkouts||["",""];
            const label=fw[idx], done=today.workouts?.[`flex_${idx}`];
            return (
              <div key={idx} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0"}}>
                {label ? (
                  <>
                    <div onClick={()=>toggleFlex(idx)} style={{width:22,height:22,borderRadius:7,flexShrink:0,cursor:"pointer",background:done?TYPE_COLORS.custom:TYPE_BG.custom,border:`2px solid ${done?TYPE_COLORS.custom:"rgba(210,175,150,0.3)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {done && <span style={{fontSize:11,fontWeight:900,color:"white"}}>✓</span>}
                    </div>
                    <span style={{flex:1,fontSize:13,fontWeight:600,color:done?WARM:"#c8b0a0"}}>{label}</span>
                    <button style={{...btnS,fontSize:10,padding:"4px 8px"}} onClick={()=>{ const fw2=[...(today.flexWorkouts||["",""])]; fw2[idx]=""; saveDay({...today,flexWorkouts:fw2}); }}>✕</button>
                  </>
                ) : flexEdit[idx] ? (
                  <div style={{display:"flex",gap:6,flex:1}}>
                    <input style={{...inp,flex:1,fontSize:12,padding:"7px 10px"}} placeholder="z.B. Padel 60 Min" value={flexIn[idx]} onChange={e=>{const ni=[...flexIn];ni[idx]=e.target.value;setFlexIn(ni);}} onKeyDown={e=>e.key==="Enter"&&saveFlex(idx,flexIn[idx])} autoFocus/>
                    <button style={{...btn,padding:"7px 12px",fontSize:12}} onClick={()=>saveFlex(idx,flexIn[idx])}>+</button>
                  </div>
                ) : (
                  <button style={{...btnG,fontSize:12,color:"#b8a090"}} onClick={()=>{const ne=[...flexEdit];ne[idx]=true;setFlexEdit(ne);}}>+ Flex-Sport eintragen</button>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

// ─── LOG VIEW ────────────────────────────────────────────────────────────────
function LogView({ today, saveDay, settings, totalWater }) {
  const [chatInput,setChatInput]       = useState("");
  const [chatLoading,setChatLoading]   = useState(false);
  const [suggestion,setSuggestion]     = useState(null);
  const [photoPreview,setPhotoPreview] = useState(null);
  const [waterInput,setWaterInput]     = useState("");
  const [selectedSlot,setSelectedSlot] = useState(settings.mealSlots[0]?.id||"");
  const [listening,setListening]       = useState(false);
  const [transcript,setTranscript]     = useState("");
  const fileRef  = useRef();
  const recogRef = useRef(null);

  useEffect(() => {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR) return;
    const r = new SR();
    r.lang="de-DE"; r.continuous=false; r.interimResults=true;
    r.onresult = e => {
      const t=Array.from(e.results).map(r=>r[0].transcript).join("");
      setTranscript(t);
      if (e.results[e.results.length-1].isFinal) { setChatInput(t); setTranscript(""); setListening(false); }
    };
    r.onend=()=>setListening(false); r.onerror=()=>setListening(false);
    recogRef.current=r;
  },[]);

  useEffect(() => {
    const h=new Date().getHours();
    const slots=settings.mealSlots;
    let best=slots[0]?.id;
    for (const s of slots) { const [sh]=s.time.split(":").map(Number); if(h>=sh) best=s.id; }
    setSelectedSlot(best);
  },[settings.mealSlots]);

  function toggleVoice() {
    if (!recogRef.current) { alert("Sprachsteuerung nicht verfügbar."); return; }
    if (listening) { recogRef.current.stop(); setListening(false); }
    else { recogRef.current.start(); setListening(true); setTranscript(""); }
  }

  async function handleSend(imageFile) {
    const text=chatInput.trim();
    if (!text && !imageFile) return;
    setChatLoading(true); setSuggestion(null);
    try {
      let messages;
      if (imageFile) {
        const b64=await fileToBase64(imageFile);
        messages=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:imageFile.type||"image/jpeg",data:b64}},{type:"text",text:text||"Was ist das und wie viele Kalorien/Protein?"}]}];
      } else { messages=[{role:"user",content:text}]; }
      const raw=await askClaude(messages);
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setSuggestion(parsed);
    } catch { setSuggestion({error:"Konnte nicht analysieren. Versuch nochmal."}); }
    setChatLoading(false);
  }

  function confirmSuggestion() {
    if (!suggestion||suggestion.error) return;
    if (suggestion.kcal>300) { const ok=window.confirm(`⚠️ ${suggestion.kcal} kcal – große Portion. Trotzdem eintragen?`); if(!ok) return; }
    saveDay({...today,entries:[...(today.entries||[]),{id:Date.now(),name:suggestion.name,kcal:suggestion.kcal,protein:suggestion.protein,slotId:selectedSlot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});
    setSuggestion(null); setChatInput(""); setPhotoPreview(null);
  }

  function addFav(f) {
    saveDay({...today,entries:[...(today.entries||[]),{id:Date.now(),name:f.name,kcal:f.kcal,protein:f.protein,slotId:selectedSlot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});
  }

  return (
    <>
      {/* Slot selector */}
      <div style={card}>
        <div style={sec}>Für welche Mahlzeit?</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {settings.mealSlots.map(s => (
            <button key={s.id} onClick={()=>setSelectedSlot(s.id)} style={{padding:"7px 12px",borderRadius:12,border:selectedSlot===s.id?"none":"1.5px solid rgba(210,175,150,0.3)",cursor:"pointer",background:selectedSlot===s.id?`linear-gradient(135deg,${CAMEL},#a0714a)`:"rgba(255,248,244,0.8)",color:selectedSlot===s.id?"#fff8f2":MUTED,fontSize:11,fontWeight:700,boxShadow:selectedSlot===s.id?"0 3px 10px rgba(180,110,60,0.25)":"none"}}>
              {s.time} {s.label}
            </button>
          ))}
        </div>
      </div>

      {/* Favorites */}
      <div style={card}>
        <div style={sec}>Schnelleinträge ⚡</div>
        {settings.favorites.map(f => (
          <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"rgba(255,248,244,0.7)",borderRadius:12,border:"1px solid rgba(210,175,150,0.2)",marginBottom:7}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:WARM}}>{f.name}</div>
              <div style={{fontSize:11,color:MUTED,marginTop:1}}><span style={{color:CAMEL}}>{f.kcal} kcal</span> · <span style={{color:"#c17a6b"}}>{f.protein}g P</span></div>
            </div>
            <button style={{...btn,padding:"7px 14px",fontSize:12}} onClick={()=>addFav(f)}>+ Add</button>
          </div>
        ))}
      </div>

      {/* Voice + AI */}
      <div style={card}>
        <div style={sec}>KI-Analyse ✨</div>
        <div style={{fontSize:12,color:MUTED,marginBottom:14,lineHeight:1.6}}>Sprich oder schreib was du gegessen hast, oder lade ein Foto hoch.</div>
        {photoPreview && <img src={photoPreview} alt="" style={{width:"100%",borderRadius:14,maxHeight:180,objectFit:"cover",marginBottom:12}}/>}
        {listening && (
          <div style={{marginBottom:10,padding:12,background:"linear-gradient(135deg,#fde8f0,#fdf0e8)",borderRadius:14,textAlign:"center",border:"1.5px solid rgba(210,150,150,0.3)"}}>
            <div style={{fontSize:22,marginBottom:4}}>🎙️</div>
            <div style={{fontSize:12,color:"#c07070",fontWeight:700}}>Zuhören… {transcript && `„${transcript}"`}</div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <button onClick={toggleVoice} style={{width:44,height:44,borderRadius:12,border:listening?"none":"1.5px solid rgba(210,175,150,0.35)",cursor:"pointer",flexShrink:0,background:listening?"linear-gradient(135deg,#f0b0b0,#e08080)":"rgba(255,248,244,0.9)",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:listening?"0 0 16px rgba(200,80,80,0.4)":"none"}}>🎙️</button>
          <input style={{...inp,flex:1}} placeholder="z.B. Protein Shake mit Beeren…" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend(null)}/>
          <button style={btn} onClick={()=>handleSend(null)} disabled={chatLoading}>{chatLoading?"…":"→"}</button>
        </div>
        <button style={{...btnG,width:"100%",padding:"11px",textAlign:"center",borderRadius:12,fontWeight:700,color:CAMEL}} onClick={()=>fileRef.current.click()}>📷 Foto hochladen</button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;setPhotoPreview(URL.createObjectURL(f));handleSend(f);}}/>
        {chatLoading && <div style={{marginTop:14,padding:14,background:"linear-gradient(135deg,#fdf0e8,#fde8e0)",borderRadius:14,textAlign:"center",fontSize:13,color:CAMEL,fontWeight:700,border:"1px solid rgba(210,175,150,0.3)"}}>✨ Analysiere…</div>}
        {suggestion && !suggestion.error && (
          <div style={{marginTop:14,padding:16,background:"linear-gradient(135deg,#fdf0e8,#fde8e8)",border:"1.5px solid rgba(210,160,130,0.35)",borderRadius:18}}>
            <div style={{fontSize:17,fontWeight:700,marginBottom:8,color:WARM}}>{suggestion.name}</div>
            <div style={{display:"flex",gap:10,marginBottom:suggestion.note?10:14}}>
              <span style={{fontSize:13,fontWeight:700,color:CAMEL,background:"rgba(240,220,200,0.5)",padding:"4px 10px",borderRadius:8}}>{suggestion.kcal} kcal</span>
              <span style={{fontSize:13,fontWeight:700,color:"#c17a6b",background:"rgba(240,210,205,0.5)",padding:"4px 10px",borderRadius:8}}>{suggestion.protein}g Protein</span>
              {suggestion.kcal>300 && <span style={{fontSize:12,fontWeight:700,color:"#c07060",background:"rgba(240,200,190,0.5)",padding:"4px 10px",borderRadius:8}}>⚠️ groß</span>}
            </div>
            {suggestion.note && <div style={{fontSize:12,color:MUTED,marginBottom:12,lineHeight:1.4}}>{suggestion.note}</div>}
            <div style={{display:"flex",gap:8}}>
              <button style={{...btn,flex:1}} onClick={confirmSuggestion}>✓ Eintragen</button>
              <button style={btnG} onClick={()=>{setSuggestion(null);setPhotoPreview(null);}}>✕</button>
            </div>
          </div>
        )}
        {suggestion?.error && <div style={{marginTop:12,padding:14,background:"#fde8e8",borderRadius:14,fontSize:13,color:"#c06060",fontWeight:700,border:"1px solid rgba(210,150,150,0.3)"}}>{suggestion.error}</div>}
      </div>

      {/* Water */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={sec}>Wasser 💧</div>
          <span style={{fontSize:13,fontWeight:700,color:"#8aabcc"}}>{totalWater}ml</span>
        </div>
        <div style={{height:6,background:"rgba(138,171,204,0.18)",borderRadius:3,marginBottom:12,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(totalWater/settings.goals.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3,transition:"width 0.4s"}}/>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {[200,300,500].map(ml => (
            <button key={ml} style={{...btnG,flex:1,color:"#7a9fc0",borderColor:"rgba(138,171,204,0.35)",background:"rgba(225,240,252,0.5)",fontWeight:700}} onClick={()=>saveDay({...today,water:(today.water||0)+ml})}>+{ml}ml</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input style={{...inp,flex:1}} placeholder="andere Menge in ml" type="number" value={waterInput} onChange={e=>setWaterInput(e.target.value)}/>
          <button style={btn} onClick={()=>{ const ml=parseInt(waterInput); if(ml){saveDay({...today,water:(today.water||0)+ml});setWaterInput("");} }}>+</button>
        </div>
      </div>
    </>
  );
}

// ─── HISTORY VIEW ────────────────────────────────────────────────────────────
function HistoryView({ days, settings }) {
  const today = new Date();
  const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-6+i); return d.toISOString().split("T")[0]; });
  const weekData = weekDays.map(date => {
    const d=days[date];
    if (!d) return {date,kcal:0,protein:0,water:0,hasData:false};
    return {date,kcal:(d.entries||[]).reduce((s,e)=>s+(e.kcal||0),0),protein:(d.entries||[]).reduce((s,e)=>s+(e.protein||0),0),water:d.water||0,hasData:true};
  });
  const withData=weekData.filter(d=>d.hasData);

  const historyDays = Object.entries(days).sort(([a],[b])=>a.localeCompare(b)).slice(-14).map(([date,d])=>({
    date, kcal:(d.entries||[]).reduce((s,e)=>s+(e.kcal||0),0), protein:(d.entries||[]).reduce((s,e)=>s+(e.protein||0),0),
    water:d.water||0, weight:d.weight||null, steps:d.steps||null, suppl:d.supplements||{},
  }));

  if (historyDays.length===0) return (
    <div style={{...card,textAlign:"center",color:MUTED,fontSize:13,fontWeight:700,padding:32}}>
      <div style={{fontSize:36,marginBottom:10}}>📊</div>Noch keine Daten vorhanden
    </div>
  );

  const avgKcal=withData.length?Math.round(withData.reduce((s,d)=>s+d.kcal,0)/withData.length):0;
  const avgProt=withData.length?Math.round(withData.reduce((s,d)=>s+d.protein,0)/withData.length):0;
  const daysOnTarget=withData.filter(d=>d.protein>=settings.goals.protein*0.8).length;

  return (
    <>
      {/* Week summary */}
      {withData.length>0 && (
        <div style={card}>
          <div style={sec}>Wochenrückblick 📊</div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[
              {val:avgKcal, label:"Ø kcal/Tag", color:avgKcal>settings.goals.kcal?"#c07060":CAMEL, bg:"linear-gradient(135deg,#fdf0e8,#fdeee6)"},
              {val:`${avgProt}g`, label:"Ø Protein/Tag", color:avgProt>=settings.goals.protein?GREEN:"#c17a6b", bg:"linear-gradient(135deg,#fdf0ee,#fde8e8)"},
              {val:`${daysOnTarget}/7`, label:"Protein-Ziel", color:GREEN, bg:"linear-gradient(135deg,#f0fde8,#e8fde0)"},
            ].map((x,i) => (
              <div key={i} style={{flex:1,padding:"12px 10px",background:x.bg,borderRadius:14,textAlign:"center",border:"1px solid rgba(210,175,150,0.25)"}}>
                <div style={{fontSize:20,fontWeight:800,color:x.color}}>{x.val}</div>
                <div style={{fontSize:10,color:MUTED,fontWeight:700,marginTop:2}}>{x.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60}}>
            {weekData.map(d => {
              const h=d.hasData?Math.max((d.kcal/settings.goals.kcal)*48,3):3;
              const isToday=d.date===new Date().toISOString().split("T")[0];
              return (
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{width:"100%",height:h,background:!d.hasData?"rgba(210,175,150,0.15)":d.kcal>settings.goals.kcal?"linear-gradient(180deg,#f0b0a0,#c07060)":"linear-gradient(180deg,#f0d0b0,#c9956a)",borderRadius:"5px 5px 0 0",outline:isToday?`2px solid ${CAMEL}`:"none"}}/>
                  <div style={{fontSize:7,color:isToday?CAMEL:"#c8b0a0",fontWeight:isToday?800:500}}>
                    {["So","Mo","Di","Mi","Do","Fr","Sa"][new Date(d.date).getDay()]}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {historyDays.some(d=>d.weight) && (
        <div style={card}>
          <div style={sec}>Gewicht ⚖️</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
            {historyDays.filter(d=>d.weight).map((d,i,arr)=>{
              const mn=Math.min(...arr.map(x=>x.weight))-0.5, mx=Math.max(...arr.map(x=>x.weight))+0.5;
              const h=((d.weight-mn)/(mx-mn))*55+10;
              return (
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{fontSize:7,color:MUTED,fontWeight:700}}>{d.weight}</div>
                  <div style={{width:"100%",height:h,background:`linear-gradient(180deg,#f0d0b8,${CAMEL})`,borderRadius:"6px 6px 0 0"}}/>
                  <div style={{fontSize:7,color:"#c8b0a0"}}>{d.date.slice(5)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={card}>
        <div style={sec}>Tagesdetails</div>
        {[...historyDays].reverse().map(d => {
          const supplDone=settings.supplements.filter(s=>d.suppl[s.id]);
          return (
            <div key={d.date} style={{padding:"11px 0",borderBottom:"1px solid rgba(210,175,150,0.18)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:800,color:WARM}}>{new Date(d.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})}</span>
                {d.weight && <span style={{fontSize:12,fontWeight:700,color:CAMEL,background:"rgba(240,220,200,0.5)",padding:"2px 8px",borderRadius:6}}>{d.weight} kg</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,fontSize:11}}>
                <span style={{color:d.kcal>settings.goals.kcal?"#c07060":CAMEL,fontWeight:700,background:"rgba(240,220,200,0.5)",padding:"2px 8px",borderRadius:6}}>{d.kcal} kcal</span>
                <span style={{color:d.protein>=settings.goals.protein?GREEN:"#c8b0a0",fontWeight:700,background:"rgba(240,230,220,0.4)",padding:"2px 8px",borderRadius:6}}>{d.protein}g P</span>
                <span style={{color:d.water>=settings.goals.water?BLUE:"#c8b0a0",fontWeight:700,background:"rgba(240,230,220,0.4)",padding:"2px 8px",borderRadius:6}}>{(d.water/1000).toFixed(1)}L</span>
                {d.steps && <span style={{color:d.steps>=settings.goals.steps?GREEN:"#c8b0a0",fontWeight:700,background:"rgba(240,230,220,0.4)",padding:"2px 8px",borderRadius:6}}>{d.steps.toLocaleString("de-DE")} 👟</span>}
                {supplDone.length>0 && <span style={{background:"rgba(240,220,200,0.4)",padding:"2px 8px",borderRadius:6}}>{supplDone.map(s=>s.emoji).join("")}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ─── SETTINGS VIEW ───────────────────────────────────────────────────────────

  const addW=day=>setLocal(p=>{const pl=JSON.parse(JSON.stringify(p.workoutPlan));pl[day]=[...(pl[day]||[]),{id:`w${Date.now()}`,label:"",type:"custom"}];return{...p,workoutPlan:pl};});
  const remW=(day,i)=>setLocal(p=>{const pl=JSON.parse(JSON.stringify(p.workoutPlan));pl[day]=pl[day].filter((_,j)=>j!==i);return{...p,workoutPlan:pl};});
  const upFav=(i,f,v)=>setLocal(p=>{const fa=[...p.favorites];fa[i]={...fa[i],[f]:f==="name"?v:Number(v)};return{...p,favorites:fa};});

        {[["goals","Ziele"],["supplements","Suppl."],["meals","Mahlz."],["workouts","Sport"],["favorites","Favs"]].map(([k,l])=>(
          <button key={k} style={tabS(k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      <div style={{padding:"0 20px"}}>
        {tab==="goals" && (
          <div style={card}>
            <div style={sec}>Tagesziele</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:MUTED,fontWeight:600,marginBottom:5}}>Name</div>
              <input style={inp} value={local.name} onChange={e=>setLocal(p=>({...p,name:e.target.value}))} placeholder="Dein Name"/>
            </div>
            {[["kcal","Kalorien","🔥"],["protein","Protein (g)","✨"],["water","Wasser (ml)","💧"],["steps","Schritte","👟"]].map(([k,l,e])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{fontSize:12,color:MUTED,fontWeight:600,marginBottom:5}}>{e} {l}</div>
                <input style={inp} type="number" value={local.goals[k]} onChange={ev=>upGoal(k,ev.target.value)}/>
              </div>
            ))}
          </div>
        )}
        {tab==="supplements" && (
          <div style={card}>
            <div style={sec}>Supplements</div>
            {local.supplements.map((s,i)=>(
              <div key={s.id} style={{padding:"12px 0",borderBottom:"1px solid rgba(210,175,150,0.18)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6}}>
                  <input style={{...inp,width:48,textAlign:"center",padding:"8px"}} value={s.emoji} onChange={e=>upSuppl(i,"emoji",e.target.value)}/>
                  <input style={{...inp,flex:1}} value={s.label} onChange={e=>upSuppl(i,"label",e.target.value)} placeholder="Name"/>
                  <button style={{...btnS,color:"#c07060"}} onClick={()=>setLocal(p=>({...p,supplements:p.supplements.filter((_,j)=>j!==i)}))}>✕</button>
                </div>
                <input style={{...inp,fontSize:12}} value={s.time} onChange={e=>upSuppl(i,"time",e.target.value)} placeholder="Zeitpunkt"/>
              </div>
            ))}
            <button style={{...btnG,marginTop:12,width:"100%",textAlign:"center",color:CAMEL}} onClick={()=>setLocal(p=>({...p,supplements:[...p.supplements,{id:`s${Date.now()}`,label:"Neu",emoji:"💊",time:"täglich"}]}))}>+ Supplement hinzufügen</button>
          </div>
        )}
        {tab==="meals" && (
          <div style={card}>
            <div style={sec}>Mahlzeiten-Slots</div>
            {local.mealSlots.map((s,i)=>(
              <div key={s.id} style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
                <input style={{...inp,width:64,textAlign:"center",padding:"8px"}} value={s.time} onChange={e=>upMeal(i,"time",e.target.value)}/>
                <input style={{...inp,flex:1}} value={s.label} onChange={e=>upMeal(i,"label",e.target.value)}/>
              </div>
            ))}
            <div style={{fontSize:11,color:MUTED,marginTop:8,lineHeight:1.5}}>💡 Mindestens 3h Abstand empfohlen bei Sleeve.</div>
          </div>
        )}
        {tab==="workouts" && DAYS.map(day=>(
          <div key={day} style={card}>
            <div style={sec}>{DL[day]}</div>
            {(local.workoutPlan[day]||[]).length===0 && <div style={{fontSize:12,color:MUTED,marginBottom:8}}>Ruhetag</div>}
            {(local.workoutPlan[day]||[]).map((w,i)=>(
              <div key={w.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input style={{...inp,flex:1,fontSize:12}} value={w.label} onChange={e=>upW(day,i,"label",e.target.value)} placeholder="Workout"/>
                <button style={{...btnS,color:"#c07060"}} onClick={()=>remW(day,i)}>✕</button>
              </div>
            ))}
            <button style={{...btnG,fontSize:11,color:CAMEL}} onClick={()=>addW(day)}>+ Hinzufügen</button>
          </div>
        ))}
        {tab==="favorites" && (
          <div style={card}>
            <div style={sec}>Schnelleinträge ⚡</div>
            {local.favorites.map((f,i)=>(
              <div key={f.id} style={{padding:"10px 0",borderBottom:"1px solid rgba(210,175,150,0.18)"}}>
                <div style={{display:"flex",gap:8,marginBottom:6}}>
                  <input style={{...inp,flex:2}} value={f.name} onChange={e=>upFav(i,"name",e.target.value)} placeholder="Name"/>
                  <button style={{...btnS,color:"#c07060"}} onClick={()=>setLocal(p=>({...p,favorites:p.favorites.filter((_,j)=>j!==i)}))}>✕</button>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp,flex:1,fontSize:12}} type="number" value={f.kcal} onChange={e=>upFav(i,"kcal",e.target.value)} placeholder="kcal"/>
                  <input style={{...inp,flex:1,fontSize:12}} type="number" value={f.protein} onChange={e=>upFav(i,"protein",e.target.value)} placeholder="Protein g"/>
                </div>
              </div>
            ))}
            <button style={{...btnG,marginTop:12,width:"100%",textAlign:"center",color:CAMEL}} onClick={()=>setLocal(p=>({...p,favorites:[...p.favorites,{id:`f${Date.now()}`,name:"",kcal:0,protein:0}]}))}>+ Favorit hinzufügen</button>
          </div>
        )}
        <button style={{...btn,width:"100%",padding:"15px",fontSize:15,borderRadius:16,marginTop:8}} onClick={()=>{setSettings(local);onClose();}}>✓ Speichern & Schließen</button>
        <button style={{...btnG,width:"100%",padding:"12px",borderRadius:14,marginTop:8,textAlign:"center",color:"#c07060",borderColor:"rgba(200,150,150,0.3)"}} onClick={()=>{if(window.confirm("Einstellungen zurücksetzen?"))setLocal(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)));}}>↺ Zurücksetzen</button>
        <button style={{...btnG,width:"100%",padding:"12px",borderRadius:14,marginTop:8,textAlign:"center",color:"#8a6080",borderColor:"rgba(180,140,180,0.3)"}} onClick={()=>{if(window.confirm("API Key löschen und neu eingeben?")){ localStorage.removeItem("alana_apikey"); window.location.reload(); }}}>🔑 API Key ändern</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const todayKey = getTodayKey();
  const todayDow = getDOW();
  const [hasKey, setHasKey] = useState(()=>!!localStorage.getItem("alana_apikey"));
  const [settings,setSettings] = useState(()=>load("alana_settings",DEFAULT_SETTINGS));
  const [days,setDays] = useState(()=>load("alana_v3",{}));
  const [view,setView] = useState("today");
  const [showSettings,setShowSettings] = useState(false);
  if (!hasKey) return <ApiKeySetup onDone={()=>setHasKey(true)}/>;
  useEffect(()=>{ save("alana_settings",settings); },[settings]);
  useEffect(()=>{ save("alana_v3",days); },[days]);

  const today = days[todayKey]||{entries:[],water:0,workouts:{},supplements:{},weight:null,steps:null,flexWorkouts:["",""]};
  function saveDay(updated) { setDays(prev=>({...prev,[todayKey]:updated})); }

  const totalKcal    = today.entries.reduce((s,e)=>s+(e.kcal||0),0);
  const totalProtein = today.entries.reduce((s,e)=>s+(e.protein||0),0);
  const totalWater   = today.water||0;
  const streak       = calcStreak(days,settings.goals);
  const remaining    = settings.goals.kcal-totalKcal;
  const dateStr      = new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});

  const BG = { minHeight:"100vh", background:`${LEO_URI}, linear-gradient(160deg,#fde8e8 0%,#fdf0e8 40%,#fdeee6 100%)`, backgroundBlendMode:"multiply", color:WARM, maxWidth:430, margin:"0 auto", paddingBottom:96 };

  if (showSettings) return (
    <div style={BG}>
      <div style={{position:"fixed",inset:0,background:"linear-gradient(160deg,rgba(253,224,224,0.55) 0%,rgba(253,240,232,0.5) 50%,rgba(253,238,230,0.5) 100%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1}}>
        <SettingsView settings={settings} setSettings={setSettings} onClose={()=>setShowSettings(false)}/>
      </div>
    </div>
  );

  return (
    <div style={BG}>
      <div style={{position:"fixed",inset:0,background:"linear-gradient(160deg,rgba(253,224,224,0.55) 0%,rgba(253,240,232,0.5) 50%,rgba(253,238,230,0.5) 100%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1}}>

        <div style={{padding:"32px 20px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{fontSize:28,fontWeight:700,color:WARM,lineHeight:1.1}}>Hey {settings.name} 🌸</div>
              <div style={{fontSize:11,color:MUTED,fontWeight:600,letterSpacing:"0.06em",marginTop:3,textTransform:"uppercase"}}>{dateStr}</div>
              {streak>1 && (
                <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:5,background:"linear-gradient(135deg,#fff3e0,#ffe0b2)",padding:"4px 10px",borderRadius:20,border:"1px solid rgba(210,160,80,0.3)"}}>
                  <span style={{fontSize:13}}>🔥</span>
                  <span style={{fontSize:11,fontWeight:800,color:"#b8660b"}}>{streak} Tage Streak</span>
                </div>
              )}
            </div>
            <button onClick={()=>setShowSettings(true)} style={{width:48,height:48,borderRadius:"50%",background:`${LEO_URI}, linear-gradient(135deg,${ROSE},#f0c8a0)`,backgroundBlendMode:"multiply",border:"2px solid rgba(210,175,150,0.4)",boxShadow:"0 4px 16px rgba(180,110,60,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer"}}>🐆</button>
          </div>

          <div style={{...card,background:"rgba(255,252,249,0.92)",padding:"20px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-around",marginBottom:14}}>
              <Ring value={totalKcal}   max={settings.goals.kcal}    color={CAMEL}   bgColor="#f5e6d8" label="Kalorien" emoji="🔥"/>
              <Ring value={totalProtein} max={settings.goals.protein} color="#c17a6b" bgColor="#f7e5e2" label="Protein"  unit="g" emoji="✨"/>
              <Ring value={Math.round(totalWater/100)*100} max={settings.goals.water} color="#8aabcc" bgColor="#e2eef7" label="Wasser" emoji="💧"/>
              <Ring value={today.steps||0} max={settings.goals.steps} color="#9aaa7a" bgColor="#edf2e2" label="Schritte" emoji="👟"/>
            </div>
            <div style={{background:remaining<0?"linear-gradient(90deg,#fde8e8,#fdf0ec)":"linear-gradient(90deg,#f0f5e8,#f8fdf0)",borderRadius:12,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${remaining<0?"rgba(210,150,150,0.25)":"rgba(160,185,130,0.25)"}`}}>
              <span style={{fontSize:12,color:MUTED,fontWeight:600}}>Noch verfügbar</span>
              <span style={{fontSize:15,fontWeight:800,color:remaining<0?"#c07060":GREEN}}>{remaining<0?`+${Math.abs(remaining)}`:remaining} kcal</span>
            </div>
          </div>
        </div>

        <div style={{display:"flex",margin:"12px 20px 14px",background:"rgba(255,252,249,0.85)",borderRadius:18,padding:4,boxShadow:"0 2px 14px rgba(180,110,60,0.10)",border:"1px solid rgba(210,175,150,0.25)"}}>
          {[["today","✦ Heute"],["log","+ Eintragen"],["history","↗ Verlauf"]].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={{flex:1,padding:"10px 0",border:"none",borderRadius:14,cursor:"pointer",background:view===k?`linear-gradient(135deg,${CAMEL},#a0714a)`:"none",color:view===k?"#fff8f2":MUTED,fontSize:11,fontWeight:700,letterSpacing:"0.04em",transition:"all 0.2s",boxShadow:view===k?"0 4px 12px rgba(180,110,60,0.28)":"none"}}>{l}</button>
          ))}
        </div>

        <div style={{padding:"0 20px"}}>
          {view==="today"   && <TodayView   today={today} saveDay={saveDay} settings={settings} todayDow={todayDow}/>}
          {view==="log"     && <LogView     today={today} saveDay={saveDay} settings={settings} totalWater={totalWater}/>}
          {view==="history" && <HistoryView days={days}   settings={settings}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
