<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Alana"/>
<title>Alana Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fdf6f1;font-family:-apple-system,sans-serif;max-width:430px;margin:0 auto;padding-bottom:80px}.card{background:rgba(255,252,249,.92);border-radius:20px;padding:16px;margin:0 16px 12px;box-shadow:0 2px 16px rgba(180,120,80,.1);border:1px solid rgba(210,175,150,.25)}.sec{font-size:10px;font-weight:700;color:#b89880;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}.inp{background:rgba(255,248,244,.9);border:1.5px solid rgba(210,175,150,.35);border-radius:10px;padding:10px 12px;color:#5a3a2a;font-size:14px;outline:none;width:100%;box-sizing:border-box}.btn{background:linear-gradient(135deg,#c9956a,#a0714a);border:none;border-radius:10px;padding:10px 18px;color:#fff8f2;font-size:13px;font-weight:700;cursor:pointer}.btnG{background:rgba(255,248,244,.8);border:1.5px solid rgba(210,175,150,.35);border-radius:9px;padding:7px 12px;color:#b89880;font-size:12px;font-weight:600;cursor:pointer}nav{display:flex;margin:12px 16px;background:rgba(255,252,249,.85);border-radius:16px;padding:4px;border:1px solid rgba(210,175,150,.25)}nav button{flex:1;padding:9px 0;border:none;border-radius:12px;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;
const L=(k,d)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch{return d;}};
const S=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const TK=()=>new Date().toISOString().split("T")[0];
const DOW=()=>["SU","MO","TU","WE","TH","FR","SA"][new Date().getDay()];
const CAMEL="#c9956a",WARM="#5a3a2a",MUTED="#b89880",GREEN="#7a9a50";
const GOALS={kcal:1550,protein:100,water:2500,steps:10000};
const SUPPS=[{id:"e",l:"Eisen",e:"🩸",t:"06:00 nüchtern"},{id:"m",l:"Multi",e:"💊",t:"Frühstück"},{id:"o",l:"Omega-3",e:"🐟",t:"Frühstück"}];
const SLOTS=[{id:"m1",l:"Frühstück",t:"08:00"},{id:"m2",l:"Snack",t:"11:00"},{id:"m3",l:"Mittagessen",t:"13:00"},{id:"m4",l:"Snack",t:"16:00"},{id:"m5",l:"Abendessen",t:"19:00"}];
const WO={MO:[{id:"w1",l:"Core 10 Min"}],TU:[],WE:[{id:"w2",l:"Kraft: Unterkörper + Rücken"},{id:"w3",l:"Core 10 Min"}],TH:[],FR:[{id:"w4",l:"Peloton"},{id:"w5",l:"Core 10 Min"}],SA:[],SU:[{id:"w6",l:"Funktionstraining Park 40 Min"},{id:"w7",l:"Core 10 Min"}]};
const FAVS=[{id:"f1",n:"Protein Shake",k:180,p:30},{id:"f2",n:"Magerquark 200g",k:130,p:24},{id:"f3",n:"Ei gekocht",k:78,p:6},{id:"f4",n:"Hühnerbrust 100g",k:165,p:31}];
function Ring({v,max,color,bg,label,emoji}){const pct=Math.min(v/max,1),r=33,c=2*Math.PI*r;return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{position:"relative",width:76,height:76}}><svg width="76" height="76" style={{transform:"rotate(-90deg)",position:"absolute"}}><circle cx="38" cy="38" r={r} fill="none" stroke={bg} strokeWidth="7"/><circle cx="38" cy="38" r={r} fill="none" stroke={color} strokeWidth="7" strokeDasharray={`${pct*c} ${c}`} strokeLinecap="round"/></svg><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:12}}>{emoji}</div><div style={{fontSize:v>999?8:10,fontWeight:800,color:WARM}}>{v}</div></div></div><span style={{fontSize:8,color:MUTED,fontWeight:700,textTransform:"uppercase"}}>{label}</span></div>;}
function App(){const [days,setDays]=useState(()=>L("alana_v3",{}));const [view,setView]=useState("today");useEffect(()=>S("alana_v3",days),[days]);const tk=TK(),dow=DOW();const day=days[tk]||{entries:[],water:0,workouts:{},supplements:{},weight:null,steps:null};const sd=u=>setDays(p=>({...p,[tk]:u}));const kcal=day.entries.reduce((s,e)=>s+(e.kcal||0),0);const prot=day.entries.reduce((s,e)=>s+(e.protein||0),0);const water=day.water||0;const rem=GOALS.kcal-kcal;const date=new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});return <div style={{paddingBottom:80}}><div style={{padding:"28px 16px 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div><div style={{fontSize:24,fontWeight:700,color:WARM}}>Hey Alana 🌸</div><div style={{fontSize:10,color:MUTED,fontWeight:600,textTransform:"uppercase",marginTop:2}}>{date}</div></div><div style={{fontSize:24}}>🐆</div></div><div className="card" style={{padding:"16px 10px"}}><div style={{display:"flex",justifyContent:"space-around",marginBottom:10}}><Ring v={kcal} max={GOALS.kcal} color={CAMEL} bg="#f5e6d8" label="Kalorien" emoji="🔥"/><Ring v={prot} max={GOALS.protein} color="#c17a6b" bg="#f7e5e2" label="Protein" emoji="✨"/><Ring v={Math.round(water/100)*100} max={GOALS.water} color="#8aabcc" bg="#e2eef7" label="Wasser" emoji="💧"/><Ring v={day.steps||0} max={GOALS.steps} color="#9aaa7a" bg="#edf2e2" label="Schritte" emoji="👟"/></div><div style={{background:rem<0?"#fde8e8":"#f0f5e8",borderRadius:10,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:MUTED,fontWeight:600}}>Noch verfügbar</span><span style={{fontSize:13,fontWeight:800,color:rem<0?"#c07060":GREEN}}>{rem<0?`+${Math.abs(rem)}`:rem} kcal</span></div></div></div><nav>{[["today","✦ Heute"],["log","+ Eintragen"],["hist","↗ Verlauf"]].map(([k,l])=><button key={k} onClick={()=>setView(k)} style={{background:view===k?`linear-gradient(135deg,${CAMEL},#a0714a)`:"none",color:view===k?"#fff8f2":MUTED,boxShadow:view===k?"0 3px 10px rgba(180,110,60,.28)":"none"}}>{l}</button>)}</nav><div>{view==="today"&&<Today day={day} sd={sd} dow={dow}/>}{view==="log"&&<Log day={day} sd={sd}/>}{view==="hist"&&<Hist days={days}/>}</div></div>;}
function Today({day,sd,dow}){const [wIn,setWIn]=useState(""),[sIn,setSIn]=useState("");const ws=WO[dow]||[];const tS=id=>{const s=day.supplements||{};sd({...day,supplements:{...s,[id]:!s[id]}});};const tW=id=>{const w=day.workouts||{};sd({...day,workouts:{...w,[id]:!w[id]}});};return <><div className="card"><div className="sec">Supplements</div><div style={{display:"flex",gap:8}}>{SUPPS.map(s=>{const d=day.supplements?.[s.id];return <div key={s.id} onClick={()=>tS(s.id)} style={{flex:1,padding:"10px 6px",borderRadius:12,cursor:"pointer",textAlign:"center",background:d?"linear-gradient(135deg,#f7e8d8,#fdeee6)":"rgba(255,250,246,.7)",border:`1.5px solid ${d?"rgba(200,150,100,.5)":"rgba(210,175,150,.25)"}`}}><div style={{fontSize:20}}>{s.e}</div><div style={{fontSize:9,fontWeight:700,color:d?CAMEL:MUTED,marginTop:3}}>{s.l}</div><div style={{fontSize:8,color:MUTED}}>{s.t}</div>{d&&<div style={{fontSize:9,color:CAMEL,fontWeight:800}}>✓</div>}</div>;})}</div></div><div className="card"><div className="sec">Gewicht</div>{day.weight?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:32,fontWeight:700,color:WARM}}>{day.weight} <span style={{fontSize:13,color:MUTED}}>kg</span></span><button className="btnG" onClick={()=>sd({...day,weight:null})}>Ändern</button></div>:<div style={{display:"flex",gap:8}}><input className="inp" placeholder="z.B. 81.4" value={wIn} onChange={e=>setWIn(e.target.value)} type="number" step="0.1"/><button className="btn" onClick={()=>{const w=parseFloat(wIn);if(w){sd({...day,weight:w});setWIn("");}}}>OK</button></div>}</div><div className="card"><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div className="sec">Schritte</div>{day.steps&&<span style={{fontSize:12,fontWeight:700,color:day.steps>=GOALS.steps?GREEN:MUTED}}>{day.steps.toLocaleString("de-DE")}</span>}</div>{day.steps?<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:6,background:"rgba(210,175,150,.2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(day.steps/GOALS.steps*100,100)}%`,background:"linear-gradient(90deg,#b8cc8a,#7a9a50)",borderRadius:3}}/></div><button className="btnG" onClick={()=>sd({...day,steps:null})}>Ändern</button></div>:<div style={{display:"flex",gap:8}}><input className="inp" placeholder="z.B. 10500" value={sIn} onChange={e=>setSIn(e.target.value)} type="number"/><button className="btn" onClick={()=>{const s=parseInt(sIn);if(s){sd({...day,steps:s});setSIn("");}}}>OK</button></div>}</div><div className="card"><div className="sec">Heute gegessen</div>{(day.entries||[]).length===0?<div style={{textAlign:"center",padding:"14px 0",color:MUTED,fontSize:13}}>🍽️<br/>Noch nichts – geh zu Eintragen</div>:day.entries.map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(210,175,150,.15)"}}><div><div style={{fontSize:13,fontWeight:700,color:WARM}}>{e.name}</div><div style={{fontSize:11,color:MUTED}}>{e.time} · <span style={{color:CAMEL}}>{e.kcal} kcal</span> · <span style={{color:"#c17a6b"}}>{e.protein}g P</span></div></div><button onClick={()=>sd({...day,entries:day.entries.filter(x=>x.id!==e.id)})} style={{background:"rgba(245,220,210,.5)",border:"none",color:"#c0907a",cursor:"pointer",fontSize:16,width:26,height:26,borderRadius:7,fontWeight:700}}>×</button></div>)}</div><div className="card"><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div className="sec">Wasser 💧</div><span style={{fontSize:12,fontWeight:700,color:"#8aabcc"}}>{day.water||0}ml / {GOALS.water}ml</span></div><div style={{height:5,background:"rgba(138,171,204,.18)",borderRadius:3,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((day.water||0)/GOALS.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3}}/></div><div style={{display:"flex",gap:8}}>{[200,300,500].map(ml=><button key={ml} className="btnG" style={{flex:1,color:"#7a9fc0",fontWeight:700}} onClick={()=>sd({...day,water:(day.water||0)+ml})}>+{ml}ml</button>)}</div></div><div className="card"><div className="sec">Sport heute</div>{ws.length===0&&<div style={{textAlign:"center",color:"#9aaa7a",fontSize:13,fontWeight:700,padding:"8px 0"}}>Ruhetag 🛋️</div>}{ws.map(w=>{const d=day.workouts?.[w.id];return <div key={w.id} onClick={()=>tW(w.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:"1px solid rgba(210,175,150,.12)"}}><div style={{width:20,height:20,borderRadius:6,background:d?CAMEL:"#fdf6f0",border:`2px solid ${d?CAMEL:"rgba(210,175,150,.3)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{d&&<span style={{fontSize:10,color:"white",fontWeight:900}}>✓</span>}</div><span style={{fontSize:13,fontWeight:600,color:d?WARM:MUTED}}>{w.l}</span></div>;})}</div></>;}
function Log({day,sd}){const [name,setName]=useState(""),[kcal,setKcal]=useState(""),[prot,setProt]=useState("");const [slot,setSlot]=useState("m1"),[wIn,setWIn]=useState(""),[listening,setL]=useState(false);const ref=useRef();useEffect(()=>{const h=new Date().getHours();let b="m1";SLOTS.forEach(s=>{const[sh]=s.t.split(":").map(Number);if(h>=sh)b=s.id;});setSlot(b);},[]);useEffect(()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;const r=new SR();r.lang="de-DE";r.continuous=false;r.interimResults=false;r.onresult=e=>{setName(e.results[0][0].transcript);setL(false);};r.onend=()=>setL(false);r.onerror=()=>setL(false);ref.current=r;},[]);const addE=()=>{if(!name||!kcal)return;sd({...day,entries:[...(day.entries||[]),{id:Date.now(),name,kcal:parseInt(kcal)||0,protein:parseInt(prot)||0,slotId:slot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});setName("");setKcal("");setProt("");};const addF=f=>sd({...day,entries:[...(day.entries||[]),{id:Date.now(),name:f.n,kcal:f.k,protein:f.p,slotId:slot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});return <><div className="card"><div className="sec">Für welche Mahlzeit?</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{SLOTS.map(s=><button key={s.id} onClick={()=>setSlot(s.id)} style={{padding:"6px 10px",borderRadius:9,border:slot===s.id?"none":"1.5px solid rgba(210,175,150,.3)",cursor:"pointer",background:slot===s.id?`linear-gradient(135deg,${CAMEL},#a0714a)`:"rgba(255,248,244,.8)",color:slot===s.id?"#fff8f2":MUTED,fontSize:11,fontWeight:700}}>{s.t} {s.l}</button>)}</div></div><div className="card"><div className="sec">Mahlzeit eintragen</div><div style={{fontSize:11,color:MUTED,marginBottom:10}}>💡 Frag Claude nach den Kalorien — dann hier eintragen.</div><div style={{display:"flex",gap:8,marginBottom:8}}><button onClick={()=>{if(!ref.current)return;if(listening){ref.current.stop();setL(false);}else{ref.current.start();setL(true);}}} style={{width:42,height:42,borderRadius:10,border:listening?"none":"1.5px solid rgba(210,175,150,.35)",cursor:"pointer",flexShrink:0,background:listening?"linear-gradient(135deg,#f0b0b0,#e08080)":"rgba(255,248,244,.9)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>🎙️</button><input className="inp" placeholder="Was gegessen? (oder Mikro)" value={name} onChange={e=>setName(e.target.value)}/></div>{listening&&<div style={{fontSize:11,color:"#c07070",fontWeight:600,textAlign:"center",marginBottom:8}}>🎙️ Sprich jetzt…</div>}<div style={{display:"flex",gap:8,marginBottom:12}}><div style={{flex:1}}><div style={{fontSize:10,color:MUTED,fontWeight:600,marginBottom:4}}>Kalorien</div><input className="inp" placeholder="z.B. 180" value={kcal} onChange={e=>setKcal(e.target.value)} type="number"/></div><div style={{flex:1}}><div style={{fontSize:10,color:MUTED,fontWeight:600,marginBottom:4}}>Protein (g)</div><input className="inp" placeholder="z.B. 30" value={prot} onChange={e=>setProt(e.target.value)} type="number"/></div></div><button className="btn" style={{width:"100%",padding:12,fontSize:14,borderRadius:12}} onClick={addE} disabled={!name||!kcal}>✓ Eintragen</button></div><div className="card"><div className="sec">Schnelleinträge ⚡</div>{FAVS.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"rgba(255,248,244,.7)",borderRadius:10,border:"1px solid rgba(210,175,150,.2)",marginBottom:7}}><div><div style={{fontSize:13,fontWeight:700,color:WARM}}>{f.n}</div><div style={{fontSize:11,color:MUTED}}><span style={{color:CAMEL}}>{f.k} kcal</span> · <span style={{color:"#c17a6b"}}>{f.p}g P</span></div></div><button className="btn" style={{padding:"6px 12px",fontSize:12}} onClick={()=>addF(f)}>+ Add</button></div>)}</div><div className="card"><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div className="sec">Wasser 💧</div><span style={{fontSize:12,fontWeight:700,color:"#8aabcc"}}>{day.water||0}ml</span></div><div style={{height:5,background:"rgba(138,171,204,.18)",borderRadius:3,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((day.water||0)/GOALS.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3}}/></div><div style={{display:"flex",gap:8,marginBottom:8}}>{[200,300,500].map(ml=><button key={ml} className="btnG" style={{flex:1,color:"#7a9fc0",fontWeight:700}} onClick={()=>sd({...day,water:(day.water||0)+ml})}>+{ml}ml</button>)}</div><div style={{display:"flex",gap:8}}><input className="inp" placeholder="andere ml" type="number" value={wIn} onChange={e=>setWIn(e.target.value)}/><button className="btn" onClick={()=>{const ml=parseInt(wIn);if(ml){sd({...day,water:(day.water||0)+ml});setWIn("");}}}>+</button></div></div></>;}
function Hist({days}){const hist=Object.entries(days).sort(([a],[b])=>a.localeCompare(b)).slice(-14).map(([date,d])=>({date,kcal:(d.entries||[]).reduce((s,e)=>s+(e.kcal||0),0),protein:(d.entries||[]).reduce((s,e)=>s+(e.protein||0),0),water:d.water||0,weight:d.weight||null,steps:d.steps||null}));if(!hist.length)return <div className="card" style={{textAlign:"center",color:MUTED,padding:32}}>📊<br/>Noch keine Daten</div>;return <><div className="card"><div className="sec">Tagesdetails</div>{[...hist].reverse().map(d=><div key={d.date} style={{padding:"9px 0",borderBottom:"1px solid rgba(210,175,150,.15)"}}><div style={{fontSize:12,fontWeight:800,color:WARM,marginBottom:4}}>{new Date(d.date).toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})}</div><div style={{display:"flex",flexWrap:"wrap",gap:5,fontSize:11}}><span style={{color:d.kcal>GOALS.kcal?"#c07060":CAMEL,fontWeight:700,background:"rgba(240,220,200,.5)",padding:"2px 7px",borderRadius:5}}>{d.kcal} kcal</span><span style={{color:d.protein>=GOALS.protein?GREEN:"#c8b0a0",fontWeight:700,background:"rgba(240,230,220,.4)",padding:"2px 7px",borderRadius:5}}>{d.protein}g P</span><span style={{color:d.water>=GOALS.water?"#6a9fc0":"#c8b0a0",fontWeight:700,background:"rgba(240,230,220,.4)",padding:"2px 7px",borderRadius:5}}>{(d.water/1000).toFixed(1)}L</span>{d.steps&&<span style={{fontWeight:700,background:"rgba(240,230,220,.4)",padding:"2px 7px",borderRadius:5}}>{d.steps.toLocaleString("de-DE")} 👟</span>}</div></div>)}</div></>;} 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
