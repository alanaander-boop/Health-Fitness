<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Alana"/>
<meta name="theme-color" content="#fdf6f1"/>
<title>Alana Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#fdf6f1;font-family:-apple-system,sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;
function load(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getTodayKey(){return new Date().toISOString().split("T")[0];}
function getDOW(){return["SU","MO","TU","WE","TH","FR","SA"][new Date().getDay()];}
const CAMEL="#c9956a",WARM="#5a3a2a",MUTED="#b89880",GREEN="#7a9a50",BLUE="#6a9fc0";
const card={background:"rgba(255,252,249,0.92)",borderRadius:22,padding:"16px 18px",marginBottom:12,boxShadow:"0 2px 20px rgba(180,120,80,0.10)",border:"1px solid rgba(210,175,150,0.25)"};
const sec={fontSize:11,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12};
const inp={background:"rgba(255,248,244,0.9)",border:"1.5px solid rgba(210,175,150,0.35)",borderRadius:12,padding:"11px 14px",color:WARM,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontWeight:500};
const btn={background:`linear-gradient(135deg,${CAMEL},#a0714a)`,border:"none",borderRadius:12,padding:"11px 20px",color:"#fff8f2",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(180,110,60,0.32)"};
const btnG={background:"rgba(255,248,244,0.8)",border:"1.5px solid rgba(210,175,150,0.35)",borderRadius:10,padding:"8px 14px",color:MUTED,fontSize:12,fontWeight:600,cursor:"pointer"};
const DEF={name:"Alana",goals:{kcal:1550,protein:100,water:2500,steps:10000},supplements:[{id:"eisen",label:"Eisen",emoji:"🩸",time:"nüchtern 06:00"},{id:"multi",label:"Multivitamin",emoji:"💊",time:"zum Frühstück"},{id:"omega",label:"Omega-3",emoji:"🐟",time:"zum Frühstück"}],mealSlots:[{id:"m1",label:"Frühstück",time:"08:00"},{id:"m2",label:"Snack",time:"11:00"},{id:"m3",label:"Mittagessen",time:"13:00"},{id:"m4",label:"Snack",time:"16:00"},{id:"m5",label:"Abendessen",time:"19:00"}],workoutPlan:{MO:[{id:"w1",label:"Core 10 Min"}],TU:[],WE:[{id:"w2",label:"Kraft: Unterkörper + Rücken"},{id:"w3",label:"Core 10 Min"}],TH:[],FR:[{id:"w4",label:"Peloton"},{id:"w5",label:"Core 10 Min"}],SA:[],SU:[{id:"w6",label:"Funktionstraining Park 40 Min"},{id:"w7",label:"Core 10 Min"}]},favorites:[{id:"f1",name:"Protein Shake",kcal:180,protein:30},{id:"f2",name:"Magerquark 200g",kcal:130,protein:24},{id:"f3",name:"Ei gekocht",kcal:78,protein:6},{id:"f4",name:"Hühnerbrust 100g",kcal:165,protein:31}]};
function Ring({value,max,size=80,stroke=7,color,bgColor,label,unit="",emoji}){
const pct=Math.min(value/max,1),r=(size-stroke)/2,circ=2*Math.PI*r;
return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{position:"relative",width:size,height:size}}><svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bgColor} strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s ease"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>{emoji&&<div style={{fontSize:12}}>{emoji}</div>}<div style={{fontSize:value>999?8:10,fontWeight:800,color:WARM,lineHeight:1}}>{value}{unit}</div></div></div><span style={{fontSize:9,color:MUTED,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</span></
function LogView({today,saveDay,settings}){
const [name,setName]=useState("");
const [kcal,setKcal]=useState("");
const [prot,setProt]=useState("");
const [slot,setSlot]=useState(settings.mealSlots[0]?.id||"");
const [waterIn,setWaterIn]=useState("");
const [listening,setListening]=useState(false);
const recogRef=useRef(null);
useEffect(()=>{const h=new Date().getHours();let best=settings.mealSlots[0]?.id;for(const s of settings.mealSlots){const[sh]=s.time.split(":").map(Number);if(h>=sh)best=s.id;}setSlot(best);},[]);
useEffect(()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;const r=new SR();r.lang="de-DE";r.continuous=false;r.interimResults=false;r.onresult=e=>{setName(e.results[0][0].transcript);setListening(false);};r.onend=()=>setListening(false);r.onerror=()=>setListening(false);recogRef.current=r;},[]);
function toggleVoice(){if(!recogRef.current){alert("Sprachsteuerung nicht verfügbar");return;}if(listening){recogRef.current.stop();setListening(false);}else{recogRef.current.start();setListening(true);}}
function addEntry(){if(!name||!kcal)return;saveDay({...today,entries:[...(today.entries||[]),{id:Date.now(),name,kcal:parseInt(kcal)||0,protein:parseInt(prot)||0,slotId:slot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});setName("");setKcal("");setProt("");}
function addFav(f){saveDay({...today,entries:[...(today.entries||[]),{id:Date.now(),name:f.name,kcal:f.kcal,protein:f.protein,slotId:slot,timestamp:Date.now(),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}]});}
return(<><div style={card}><div style={sec}>Für welche Mahlzeit?</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{settings.mealSlots.map(s=>(<button key={s.id} onClick={()=>setSlot(s.id)} style={{padding:"7px 10px",borderRadius:10,border:slot===s.id?"none":"1.5px solid rgba(210,175,150,0.3)",cursor:"pointer",background:slot===s.id?`linear-gradient(135deg,${CAMEL},#a0714a)`:"rgba(255,248,244,0.8)",color:slot===s.id?"#fff8f2":MUTED,fontSize:11,fontWeight:700}}>{s.time} {s.label}</button>))}</div></div>
<div style={card}><div style={sec}>Mahlzeit eintragen</div><div style={{fontSize:12,color:MUTED,marginBottom:12,lineHeight:1.5}}>💡 Frag Claude nach den Kalorien — dann hier eintragen.</div><div style={{marginBottom:10}}><div style={{fontSize:11,color:MUTED,fontWeight:600,marginBottom:5}}>Was gegessen?</div><div style={{display:"flex",gap:8}}><button onClick={toggleVoice} style={{width:44,height:44,borderRadius:12,border:listening?"none":"1.5px solid rgba(210,175,150,0.35)",cursor:"pointer",flexShrink:0,background:listening?"linear-gradient(135deg,#f0b0b0,#e08080)":"rgba(255,248,244,0.9)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>🎙️</button><input style={{...inp,flex:1}} placeholder="z.B. Protein Shake" value={name} onChange={e=>setName(e.target.value)}/></div>{listening&&<div style={{marginTop:6,fontSize:11,color:"#c07070",fontWeight:600,textAlign:"center"}}>🎙️ Sprich jetzt…</div>}</div><div style={{display:"flex",gap:8,marginBottom:14}}><div style={{flex:1}}><div style={{fontSize:11,color:MUTED,fontWeight:600,marginBottom:5}}>Kalorien</div><input style={inp} placeholder="z.B. 180" value={kcal} onChange={e=>setKcal(e.target.value)} type="number"/></div><div style={{flex:1}}><div style={{fontSize:11,color:MUTED,fontWeight:600,marginBottom:5}}>Protein (g)</div><input style={inp} placeholder="z.B. 30" value={prot} onChange={e=>setProt(e.target.value)} type="number"/></div></div><button style={{...btn,width:"100%",padding:13,fontSize:14,borderRadius:14}} onClick={addEntry} disabled={!name||!kcal}>✓ Eintragen</button></div>
<div style={card}><div style={sec}>Schnelleinträge ⚡</div>{settings.favorites.map(f=>(<div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 10px",background:"rgba(255,248,244,0.7)",borderRadius:12,border:"1px solid rgba(210,175,150,0.2)",marginBottom:7}}><div><div style={{fontSize:13,fontWeight:700,color:WARM}}>{f.name}</div><div style={{fontSize:11,color:MUTED,marginTop:1}}><span style={{color:CAMEL}}>{f.kcal} kcal</span> · <span style={{color:"#c17a6b"}}>{f.protein}g P</span></div></div><button style={{...btn,padding:"7px 14px",fontSize:12}} onClick={()=>addFav(f)}>+ Add</button></div>))}</div>
<div style={card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={sec}>Wasser 💧</div><span style={{fontSize:12,fontWeight:700,color:"#8aabcc"}}>{today.water||0}ml / {settings.goals.water}ml</span></div><div style={{height:6,background:"rgba(138,171,204,0.18)",borderRadius:3,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((today.water||0)/settings.goals.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3,transition:"width 0.4s"}}/></div><div style={{display:"flex",gap:8,marginBottom:8}}>{[200,300,500].map(ml=>(<button key={ml} style={{...btnG,flex:1,color:"#7a9fc0",borderColor:"rgba(138,171,204,0.35)",background:"rgba(225,240,252,0.5)",fontWeight:700}} onClick={()=>saveDay({...today,water:(today.water||0)+ml})}>+{ml}ml</button>))}</div><div style={{display:"flex",gap:8}}><input style={{...inp,flex:1}} placeholder="andere Menge in ml" type="number" value={waterIn} onChange={e=>setWaterIn(e.target.value)}/><button style={btn} onClick={()=>{const ml=parseInt(waterIn);if(ml){saveDay({...today,water:(today.water||0)+ml});setWaterIn("");}}}>+</button></div></div></>);}
function TodayView({today,saveDay,settings,dow}){
const [wIn,setWIn]=useState("");const [sIn,setSIn]=useState("");
const workouts=settings.workoutPlan[dow]||[];
function toggleS(id){const s=today.supplements||{};saveDay({...today,supplements:{...s,[id]:!s[id]}});}
function toggleW(id){const w=today.workouts||{};saveDay({...today,workouts:{...w,[id]:!w[id]}});}
return(<><div style={card}><div style={sec}>Supplements heute</div><div style={{display:"flex",gap:8}}>{settings.supplements.map(s=>{const done=today.supplements?.[s.id];return(<div key={s.id} onClick={()=>toggleS(s.id)} style={{flex:1,padding:"10px 6px",borderRadius:14,cursor:"pointer",textAlign:"center",background:done?"linear-gradient(135deg,#f7e8d8,#fdeee6)":"rgba(255,250,246,0.7)",border:`1.5px solid ${done?"rgba(200,150,100,0.5)":"rgba(210,175,150,0.25)"}`}}><div style={{fontSize:20,marginBottom:3}}>{s.emoji}</div><div style={{fontSize:9,fontWeight:700,color:done?CAMEL:MUTED}}>{s.label}</div><div style={{fontSize:8,color:MUTED,marginTop:1}}>{s.time}</div>{done&&<div style={{fontSize:9,color:CAMEL,fontWeight:800,marginTop:2}}>✓</div>}</div>);})}</div></div>
<div style={card}><div style={sec}>Gewicht heute</div>{today.weight?(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:34,fontWeight:700,color:WARM}}>{today.weight}</span><span style={{fontSize:13,color:MUTED,marginLeft:4}}>kg</span></div><button style={btnG} onClick={()=>saveDay({...today,weight:null})}>Ändern</button></div>):(<div style={{display:"flex",gap:8}}><input style={{...inp,flex:1}} placeholder="z.B. 81.4" value={wIn} onChange={e=>setWIn(e.target.value)} type="number" step="0.1"/><button style={btn} onClick={()=>{const w=parseFloat(wIn);if(w){saveDay({...today,weight:w});setWIn("");}}}>OK</button></div>)}</div>
<div style={card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={sec}>Schritte heute</div>{today.steps&&<span style={{fontSize:12,fontWeight:700,color:today.steps>=settings.goals.steps?GREEN:MUTED}}>{today.steps.toLocaleString("de-DE")}</span>}</div>{today.steps?(<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:6,background:"rgba(210,175,150,0.2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(today.steps/settings.goals.steps*100,100)}%`,background:"linear-gradient(90deg,#b8cc8a,#7a9a50)",borderRadius:3}}/></div><button style={btnG} onClick={()=>saveDay({...today,steps:null})}>Ändern</button></div>):(<div style={{display:"flex",gap:8}}><input style={{...inp,flex:1}} placeholder="z.B. 10500" value={sIn} onChange={e=>setSIn(e.target.value)} type="number"/><button style={btn} onClick={()=>{const s=parseInt(sIn);if(s){saveDay({...today,steps:s});setSIn("");}}}>OK</button></div>)}</div>
<div style={card}><div style={sec}>Heute gegessen</div>{(today.entries||[]).length===0?(<div style={{textAlign:"center",padding:"16px 0",color:MUTED,fontSize:13,fontWeight:600}}><div style={{fontSize:28,marginBottom:6}}>🍽️</div>Noch nichts – geh zu Eintragen</div>):today.entries.map(e=>(<div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(210,175,150,0.15)"}}><div><div style={{fontSize:13,fontWeight:700,color:WARM}}>{e.name}</div><div style={{fontSize:11,color:MUTED,marginTop:2}}>{e.time} · <span style={{color:CAMEL}}>{e.kcal} kcal</span> · <span style={{color:"#c17a6b"}}>{e.protein}g P</span></div></div><button onClick={()=>saveDay({...today,entries:today.entries.filter(x=>x.id!==e.id)})} style={{background:"rgba(245,220,210,0.5)",border:"none",color:"#c0907a",cursor:"pointer",fontSize:16,width:28,height:28,borderRadius:8,fontWeight:700}}>×</button></div>))}</div>
<div style={card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={sec}>Wasser 💧</div><span style={{fontSize:12,fontWeight:700,color:"#8aabcc"}}>{today.water||0}ml / {settings.goals.water}ml</span></div><div style={{height:6,background:"rgba(138,171,204,0.18)",borderRadius:3,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((today.water||0)/settings.goals.water*100,100)}%`,background:"linear-gradient(90deg,#a8c8e0,#6a9fc0)",borderRadius:3,transition:"width 0.4s"}}/></div><div style={{display:"flex",gap:8}}>{[200,300,500].map(ml=>(<button key={ml} style={{...btnG,flex:1,color:"#7a9fc0",borderColor:"rgba(138,171,204,0.35)",background:"rgba(225,240,252,0.5)",fontWeight:700}} onClick={()=>saveDay({...today,water:(today.water||0)+ml})}>+{ml}ml</button>))}</div></div>
<div style={card}><div style={sec}>Sport heute</div>{workouts.length===0&&<div style={{textAlign:"center",padding:"8px 0",color:"#9aaa7a",fontSize:13,fontWeight:700}}>Ruhetag 🛋️</div>}{workouts.map(w=>{const done=today.workouts?.[w.id];return(<div key={w.id} onClick={()=>toggleW(w.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",cursor:"pointer",borderBottom:"1px solid rgba(210,175,150,0.12)"}}><div style={{width:22,height:22,borderRadius:7,flexShrink:0,background:done?CAMEL:"#fdf6f0",border:`2px solid ${done?CAMEL:"rgba(210,175,150,0.3)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{done&&<span style={{fontSize:11,fontWeight:900,color:"white"}}>✓</span>}</div><span style={{fontSize:13,fontWeight:600,color:done?WARM:MUTED}}>{w.label}</span></div>);})}</div></>);}

function App(){
const todayKey=getTodayKey();const dow=getDOW();
const [settings,setSettings]=useState(()=>load("alana_settings",DEF));
const [days,setDays]=useState(()=>load("alana_v3",{}));
const [view,setView]=useState("today");
useEffect(()=>{save("alana_settings",settings);},[settings]);
useEffect(()=>{save("alana_v3",days);},[days]);
const today=days[todayKey]||{entries:[],water:0,workouts:{},supplements:{},weight:null,steps:null};
function saveDay(u){setDays(p=>({...p,[todayKey]:u}));}
const kcal=today.entries.reduce((s,e)=>s+(e.kcal||0),0);
const prot=today.entries.reduce((s,e)=>s+(e.protein||0),0);
const water=today.water||0;
const rem=settings.goals.kcal-kcal;
const dateStr=new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});
return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#fde8e8 0%,#fdf0e8 40%,#fdeee6 100%)",color:WARM,maxWidth:430,margin:"0 auto",paddingBottom:96}}>
<div style={{padding:"32px 20px 0"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
<div><div style={{fontSize:26,fontWeight:700,color:WARM,lineHeight:1.1}}>Hey {settings.name} 🌸</div><div style={{fontSize:11,color:MUTED,fontWeight:600,letterSpacing:"0.06em",marginTop:3,textTransform:"uppercase"}}>{dateStr}</div></div>
<div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#f5d0d0,#f0c8a0)",border:"2px solid rgba(210,175,150,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🐆</div>
</div>
<div style={{...card,background:"rgba(255,252,249,0.94)",padding:"18px 12px"}}>
<div style={{display:"flex",justifyContent:"space-around",marginBottom:12}}>
<Ring value={kcal} max={settings.goals.kcal} color={CAMEL} bgColor="#f5e6d8" label="Kalorien" emoji="🔥"/>
<Ring value={prot} max={settings.goals.protein} color="#c17a6b" bgColor="#f7e5e2" label="Protein" unit="g" emoji="✨"/>
<Ring value={Math.round(water/100)*100} max={settings.goals.water} color="#8aabcc" bgColor="#e2eef7" label="Wasser" emoji="💧"/>
<Ring value={today.steps||0} max={settings.goals.steps} color="#9aaa7a" bgColor="#edf2e2" label="Schritte" emoji="👟"/>
</div>
<div style={{background:rem<0?"linear-gradient(90deg,#fde8e8,#fdf0ec)":"linear-gradient(90deg,#f0f5e8,#f8fdf0)",borderRadius:10,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${rem<0?"rgba(210,150,150,0.25)":"rgba(160,185,130,0.25)"}`}}>
<span style={{fontSize:12,color:MUTED,fontWeight:600}}>Noch verfügbar</span>
<span style={{fontSize:14,fontWeight:800,color:rem<0?"#c07060":GREEN}}>{rem<0?`+${Math.abs(rem)}`:rem} kcal</span>
</div></div></div>
<div style={{display:"flex",margin:"12px 20px 14px",background:"rgba(255,252,249,0.85)",borderRadius:18,padding:4,boxShadow:"0 2px 14px rgba(180,110,60,0.10)",border:"1px solid rgba(210,175,150,0.25)"}}>
{[["today","✦ Heute"],["log","+ Eintragen"],["history","↗ Verlauf"]].map(([k,l])=>(<button key={k} onClick={()=>setView(k)} style={{flex:1,padding:"10px 0",border:"none",borderRadius:14,cursor:"pointer",background:view===k?`linear-gradient(135deg,${CAMEL},#a0714a)`:"none",color:view===k?"#fff8f2":MUTED,fontSize:11,fontWeight:700,transition:"all 0.2s",boxShadow:view===k?"0 4px 12px rgba(180,110,60,0.28)":"none"}}>{l}</button>))}
</div>
<div style={{padding:"0 20px"}}>
{view==="today"&&<TodayView today={today} saveDay={saveDay} settings={settings} dow={dow}/>}
{view==="log"&&<LogView today={today} saveDay={saveDay} settings={settings}/>}
</div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
